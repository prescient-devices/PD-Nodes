<script type="text/html" data-help-name="fileinput">
  <p>
    Asks user to select a file from the browser's file sytem and then emits its contents
    as a message or messages if the streaming option is selected.
  </p>
  <h3>Inputs</h3>
  <dl class="message-properties">
    <dt class="optional">[any properties]<span class="property-type">various</span></dt>
    <dd>
      A message on the input port acts like clicking the node's button: it opens the file
      picker in the open editor. Every property carried by the input message is merged into
      the emitted output message(s), in both streaming and non-streaming mode. The node's
      own properties (such as <code>filename</code>, <code>end</code> and the streaming
      metadata) take precedence when a name collides.
    </dd>
  </dl>
  <h3>Outputs</h3>
  <dl class="message-properties">
    <dt class="optional">[user-defined]<span class="property-type">various</span></dt>
    <dd>
      A message property defined in the node configuration outputs the user input; its
      data type may be string, number, object, Boolean or buffer.
    </dd>
    <dt class="optional">filename<span class="property-type">string</span></dt>
    <dd>The user-selected file base name.</dd>
    <dt class="optional">end<span class="property-type">Boolean</span></dt>
    <dd>
      Flag that indicates whether the message is the last (or only) message containing a
      chunk of the user-selected file. When streaming is not selected a single message
      is emitted with the whole file and this flag is <code>true</code>.
    </dd>
    <dt class="optional">start<span class="property-type">Boolean</span></dt>
    <dd>Streaming only. <code>true</code> on the first chunk of the file.</dd>
    <dt class="optional">streamId<span class="property-type">string</span></dt>
    <dd>
      Streaming only. Identifier shared by every chunk of one file, so downstream nodes
      can correlate the chunks of a single stream.
    </dd>
    <dt class="optional">index<span class="property-type">number</span></dt>
    <dd>Streaming only. Zero-based position of the chunk within the file.</dd>
    <dt class="optional">size<span class="property-type">number</span></dt>
    <dd>Streaming only. Total size of the selected file, in bytes.</dd>
  </dl>
  <h3>Details</h3>
  <p>
    After clicking the input button the user is prompted to select a file from the
    browser's file system. When streaming is selected the file is streamed as multiple
    messages, each carrying a chunk of the file along with <code>streamId</code>,
    <code>index</code>, <code>start</code>, <code>end</code> and <code>size</code> so
    downstream nodes can reassemble or forward it. When it is not selected the file is
    loaded all at once and a single output message is emitted with the entire contents.
  </p>
  <p>
    When streaming, the <b>Use backpressure</b> option pauses reading of the uploaded
    file after each chunk until a downstream <code>fileinput backpressure</code> node
    acknowledges it, so at most one chunk is in flight at a time and a slow consumer
    cannot cause unbounded queuing. If no acknowledgement arrives within 30 seconds the
    upload is aborted, so a <code>fileinput backpressure</code> node must be wired on the
    stream path when this option is enabled.
  </p>
</script>

<script type="text/html" data-help-name="fileinput-backpressure">
  <p>
    Paces a <code>fileinput</code> node that is streaming with the <b>Use backpressure</b>
    option enabled. Place this node downstream of the work that consumes each chunk; when
    a chunk reaches it, it acknowledges the chunk so the upstream node releases the next
    one. The message is passed through unchanged.
  </p>
  <p>
    The acknowledgement is correlated to its upload by the <code>streamId</code> carried
    on every streamed message, so this node must sit on the same stream path as the
    originating <code>fileinput</code> node.
  </p>
</script>
